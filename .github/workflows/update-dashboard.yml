name: Update Stock Dashboard

on:
  schedule:
    - cron: '0 22 * * *'  # 07:00 KST daily (after US close, before KOSPI open)
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Generate dashboard.html
        shell: pwsh
        run: ./Update-StockDashboard.ps1

      - name: Read email subject
        id: subject
        run: echo "text=$(cat email-subject.txt)" >> "$GITHUB_OUTPUT"

      - name: Send email summary
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.subject.outputs.text }}
          to: jhyupkim@unid.co.kr
          from: JH 투자 DASHBOARD <${{ secrets.GMAIL_USERNAME }}>
          html_body: file://email-summary.html

      - name: Prepare Pages content
        run: cp dashboard.html index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: update
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
